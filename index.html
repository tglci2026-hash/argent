<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCC App</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app-container">

    <!-- HEADER -->
    <header class="top-bar">

      <div class="user-box">
        <img src="images/avatar-default.jpg" class="avatar" alt="Avatar">

        <div>
          <h3>Bonjour Sami</h3>
          <p>Wallet Premium</p>
        </div>
      </div>

      <div class="notif-btn">
        🔔
      </div>

    </header>


    <!-- WALLET CARD -->
    <section class="wallet-card">

      <img src="images/dashboard-bg.png" class="card-bg" alt="Dashboard">

      <div class="overlay"></div>

      <div class="wallet-info">

        <p class="balance-title">SOLDE TOTAL</p>

        <h1>125 000 BCC</h1>

        <span>≈ 62 000 FCFA</span>

        <div class="wallet-id">
          ID : BCC72891
        </div>

      </div>

    </section>


    <!-- ACTIONS -->
    <section class="actions-grid">

      <div class="action-card glow-orange">
        <div class="action-icon">↗</div>
        <p>Envoyer</p>
      </div>

      <div class="action-card glow-blue">
        <div class="action-icon">↙</div>
        <p>Recevoir</p>
      </div>

      <div class="action-card glow-purple">
        <div class="action-icon">⌁</div>
        <p>Scanner</p>
      </div>

      <div class="action-card glow-green">
        <div class="action-icon">⇄</div>
        <p>Convertir</p>
      </div>

    </section>


    <!-- LIVE -->
    <section class="live-card">

      <div>
        <h2>+ 5 000 BCC</h2>
        <p>Gain quotidien reçu</p>
      </div>

      <div class="pulse-dot"></div>

    </section>


    <!-- ACTIVITÉS -->
    <section class="activities">

      <h2>Activités récentes</h2>

      <div class="activity-item">

        <div>
          <h4>Transfert reçu</h4>
          <p>Aujourd'hui</p>
        </div>

        <span>+ 5 000 BCC</span>

      </div>


      <div class="activity-item">

        <div>
          <h4>Conversion</h4>
          <p>Hier</p>
        </div>

        <span>- 2 000 BCC</span>

      </div>

    </section>


    <!-- NAVIGATION -->
    <nav class="bottom-nav">

      <a href="index.html" class="nav-item active">
        <span>⌂</span>
        <p>Accueil</p>
      </a>


      <a href="earn.html" class="bcc-button">
        <img src="images/bcc-logo.png" alt="BCC">
      </a>


      <a href="profile.html" class="nav-item">
        <span>👤</span>
        <p>Profil</p>
      </a>

    </nav>

  </div>

  <script src="script.js"></script>

</body>

</html>
