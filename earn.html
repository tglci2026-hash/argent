<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gagner BCC</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app-container">

    <header class="top-bar">

      <div>
        <h2>Gagner des BCC</h2>
        <p>Récompenses disponibles</p>
      </div>

      <div class="notif-btn">
        🪙
      </div>

    </header>


    <section class="wallet-card">

      <img src="images/dashboard-bg.png" class="card-bg">

      <div class="overlay"></div>

      <div class="wallet-info">

        <p class="balance-title">GAINS DU JOUR</p>

        <h1>+ 2 500 BCC</h1>

        <span>Continue tes activités</span>

      </div>

    </section>


    <section class="actions-grid">

      <div class="action-card glow-orange">
        <div class="action-icon">🎁</div>
        <p>Bonus</p>
      </div>

      <div class="action-card glow-blue">
        <div class="action-icon">👥</div>
        <p>Inviter</p>
      </div>

      <div class="action-card glow-purple">
        <div class="action-icon">▶</div>
        <p>Publicité</p>
      </div>

      <div class="action-card glow-green">
        <div class="action-icon">🏆</div>
        <p>Missions</p>
      </div>

    </section>


    <nav class="bottom-nav">

      <a href="index.html" class="nav-item">
        <span>⌂</span>
        <p>Accueil</p>
      </a>


      <a href="earn.html" class="bcc-button">
        <img src="images/bcc-logo.png" alt="BCC">
      </a>


      <a href="profile.html" class="nav-item">
        <span>👤</span>
        <p>Profil</p>
      </a>

    </nav>

  </div>

</body>

</html>
